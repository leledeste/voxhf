name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify version and source
        run: |
          node scripts/check-release-version.js "${GITHUB_REF_NAME}"
          npm run verify
          npm run remote:test
          npm run relay:backup:test

      - name: Build and test release packages
        run: |
          npm run release:prepare
          npm run release:test
          npm run update:test

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prerelease=""
          case "${GITHUB_REF_NAME}" in
            *-*) prerelease="--prerelease" ;;
          esac
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" \
              dist/*.zip \
              dist/release-artifacts.json \
              dist/SHA256SUMS.txt \
              --clobber
            gh release edit "${GITHUB_REF_NAME}" \
              ${prerelease} \
              --title "VoxHF ${GITHUB_REF_NAME}"
          else
            gh release create "${GITHUB_REF_NAME}" \
              dist/*.zip \
              dist/release-artifacts.json \
              dist/SHA256SUMS.txt \
              --verify-tag \
              --generate-notes \
              ${prerelease} \
              --title "VoxHF ${GITHUB_REF_NAME}"
          fi
